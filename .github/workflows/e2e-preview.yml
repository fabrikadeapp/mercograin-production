name: E2E Preview (PR)

# Smoke + flow crítico de Playwright em PRs.
# Status check INFORMATIVO — não bloqueia merge se falhar.
#
# ─── Secrets opcionais (GitHub Settings → Secrets and variables → Actions) ───
# - E2E_BASE_URL              URL alvo dos testes (default: https://www.profitsync.ia.br)
# - LAURA_INGEST_SECRET       Pra testes que batem em /api/laura/ingest
# - E2E_TEST_USER / E2E_TEST_PASS   Credenciais pra fluxos autenticados
# - E2E_DATABASE_URL          Se setado, habilita purchase-first-flow.spec.ts
#                              (testes que precisam ler/escrever no banco)
# Se um secret não estiver configurado, o teste correspondente é skipado
# graciosamente (NÃO falha).
# ─────────────────────────────────────────────────────────────────────────────

on:
  pull_request:
    branches: [main]

concurrency:
  group: e2e-preview-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-and-flow:
    name: Smoke + purchase flow (vs produção)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Status informativo: NÃO bloqueia merge
    continue-on-error: true
    permissions:
      pull-requests: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install deps
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run smoke tests
        id: smoke
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://www.profitsync.ia.br' }}
          LAURA_INGEST_SECRET: ${{ secrets.LAURA_INGEST_SECRET }}
        run: npx playwright test e2e/smoke --reporter=github

      - name: Check if DB secret configured
        id: db_check
        env:
          E2E_DB: ${{ secrets.E2E_DATABASE_URL }}
        run: |
          if [ -n "$E2E_DB" ]; then
            echo "has_db=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_db=false" >> "$GITHUB_OUTPUT"
            echo "::notice::E2E_DATABASE_URL não configurado — pulando purchase-first-flow"
          fi

      - name: Run purchase-first-flow (se DB configurado)
        id: purchase
        if: steps.db_check.outputs.has_db == 'true'
        env:
          BASE_URL: ${{ secrets.E2E_BASE_URL || 'https://www.profitsync.ia.br' }}
          DATABASE_URL: ${{ secrets.E2E_DATABASE_URL }}
          E2E_TEST_USER: ${{ secrets.E2E_TEST_USER }}
          E2E_TEST_PASS: ${{ secrets.E2E_TEST_PASS }}
        run: npx playwright test e2e/purchase-first-flow.spec.ts --reporter=github

      - name: Upload report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-preview-report
          path: |
            playwright-report/
            test-results/
          retention-days: 7

      - name: Comment status on PR
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const smoke = '${{ steps.smoke.outcome }}';
            const purchase = '${{ steps.purchase.outcome || 'skipped' }}';
            const icon = (s) => s === 'success' ? '✅' : s === 'skipped' ? '⏭️' : '⚠️';
            const body = [
              '### E2E Preview (status informativo — não bloqueia merge)',
              '',
              `- ${icon(smoke)} Smoke tests: \`${smoke}\``,
              `- ${icon(purchase)} Purchase first flow: \`${purchase}\``,
              '',
              `[Ver run](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`,
            ].join('\n');
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
