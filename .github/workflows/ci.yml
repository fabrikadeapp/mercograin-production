name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancela jobs antigos do mesmo PR/branch quando push novo chega
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  type-check:
    name: TypeScript type check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Type check
        run: npx tsc --noEmit

  build:
    name: Production build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps --no-audit --no-fund

      - name: Prisma generate
        run: npx prisma generate

      - name: Build
        env:
          # Envs mínimas pra build não quebrar
          DATABASE_URL: postgresql://noop:noop@localhost:5432/noop?schema=public
          DIRECT_URL: postgresql://noop:noop@localhost:5432/noop?schema=public
          NEXTAUTH_SECRET: ci-build-secret-not-used
          NEXTAUTH_URL: http://localhost:3000
        run: npm run build
